buildscript {
    // Define the Kotlin version variable here
    ext.kotlin_version = '2.1.0' // Updated Kotlin version for 16KB page size compatibility
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Android Gradle Plugin 8.9.1+ required by androidx.* 1.17/1.11
        classpath 'com.android.tools.build:gradle:8.9.1'
        // Add the Kotlin Gradle plugin classpath dependency
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
